services:
  # ╔══════════════════════════════════════════════════════════════════════════╗
  # ║                     GENZ WHATSAPP - RENDER DEPLOYMENT                   ║
  # ╚══════════════════════════════════════════════════════════════════════════╝

  # ── BACKEND SERVICE ──────────────────────────────────────────────────────────
  - type: web
    name: genz-whatsapp-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health/live
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

      # ── Database ──────────────────────────────────────────────────────────
      - key: MONGODB_URI
        value: mongodb+srv://genzadmin:0755266810Ivan@cluster0.uexfcmy.mongodb.net/genz?retryWrites=true&w=majority&appName=Cluster0

      # ── JWT Secrets ───────────────────────────────────────────────────────
      - key: JWT_SECRET
        value: +9x644Ou7NCXf48K0xwJtxtAxZZTK4Nvs+gg+mElpEGbJukc0dRdLdMbG2k/HHDT
      - key: JWT_REFRESH_SECRET
        value: e5zy20oXdKuDqXB7Q80xtnn/ItN2wDHEZ2LpQv9KAh4cPHckPqEBbHIgSyjB1A+0
      - key: JWT_EXPIRE
        value: 7d

      # ── App Secrets ───────────────────────────────────────────────────────
      - key: ADMIN_BOOTSTRAP_TOKEN
        value: C7+/CsBonW0GKk0NTVGqHUcuh8SSnBDIlF/Q0bkHeCJveOIxARL+zrOuU4KKVfAu
      - key: MESSAGE_ENCRYPTION_SECRET
        value: bOCgmXir8Lj66IOIB20MQRHR/V+6RWDBt3753G/i+v+2H7hQpFht9X8ri54bjJsV
      - key: BACKUP_ENCRYPTION_KEY
        value: Hxgaqo07Kc+EVLaynJD6MUV8SpjNG5ONGT32WA0LyeT6dLJxk0RUNfUMs0YcnG4l

      # ── URLs ──────────────────────────────────────────────────────────────
      - key: PUBLIC_API_URL
        value: https://genz-whatsapp-backend.onrender.com
      - key: FRONTEND_URL
        value: https://genz-whatsapp-frontend.onrender.com

      # ── Email (SMTP) ──────────────────────────────────────────────────────
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false

      # ── Malipo (Disabled kwa default) ─────────────────────────────────────
      - key: ALLOW_MOCK_PAYMENTS
        value: false
      - key: ALLOW_REAL_PAYMENT_PROVIDERS
        value: false

      # ── Media Storage (Optional) ──────────────────────────────────────────
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # ── FRONTEND STATIC SITE ─────────────────────────────────────────────────────
  - type: web
    name: genz-whatsapp-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://genz-whatsapp-backend.onrender.com
      - key: VITE_SOCKET_URL
        value: https://genz-whatsapp-backend.onrender.com
      - key: VITE_REQUIRE_AUTH
        value: true
      - key: VITE_MESSAGE_ENCRYPTION_SECRET
        value: bOCgmXir8Lj66IOIB20MQRHR/V+6RWDBt3753G/i+v+2H7hQpFht9X8ri54bjJsV
