<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're Offline - GENZ WhatsApp</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #0b141a 0%, #1a2634 100%);
      color: #e9edef;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 500px;
    }

    .icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 30px;
      background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2s ease-in-out infinite;
    }

    .icon svg {
      width: 60px;
      height: 60px;
      fill: white;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.05);
        opacity: 0.8;
      }
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 15px;
      color: #25D366;
    }

    p {
      font-size: 16px;
      line-height: 1.6;
      color: #8696a0;
      margin-bottom: 30px;
    }

    .retry-btn {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
      color: white;
      text-decoration: none;
      border-radius: 25px;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.3s ease;
      cursor: pointer;
      border: none;
    }

    .retry-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(37, 211, 102, 0.4);
    }

    .features {
      margin-top: 50px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
    }

    .feature {
      background: rgba(255, 255, 255, 0.05);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .feature-icon {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .feature h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 5px;
      color: #25D366;
    }

    .feature p {
      font-size: 12px;
      margin-bottom: 0;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 24px;
      }

      p {
        font-size: 14px;
      }

      .icon {
        width: 100px;
        height: 100px;
      }

      .icon svg {
        width: 50px;
        height: 50px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15h2v2h-2zm0-10h2v8h-2z"/>
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>GENZ WhatsApp requires an internet connection to work. Please check your connection and try again.</p>
    <button class="retry-btn" onclick="window.location.reload()">Retry</button>

    <div class="features">
      <div class="feature">
        <div class="feature-icon">💬</div>
        <h3>Offline Chats</h3>
        <p>Your chats are saved locally</p>
      </div>
      <div class="feature">
        <div class="feature-icon">🔄</div>
        <h3>Auto Sync</h3>
        <p>Messages sync when online</p>
      </div>
      <div class="feature">
        <div class="feature-icon">⚡</div>
        <h3>Fast App</h3>
        <p>Optimized for speed</p>
      </div>
    </div>
  </div>

  <script>
    // Check for internet connection every 3 seconds
    setInterval(() => {
      if (navigator.onLine) {
        window.location.reload();
      }
    }, 3000);

    // Listen for online event
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
