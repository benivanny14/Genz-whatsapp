name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Check backend syntax
        run: npm run check
        working-directory: backend

      - name: Run backend tests
        run: npm test -- --forceExit
        working-directory: backend
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-jwt-secret-with-enough-length-for-validation
          JWT_REFRESH_SECRET: ci-test-refresh-secret-with-enough-length-for-validation
          BACKUP_ENCRYPTION_KEY: ci-test-backup-key-with-enough-length

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_REQUIRE_AUTH: 'true'

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Build frontend for E2E
        run: npm run build
        working-directory: frontend
        env:
          VITE_REQUIRE_AUTH: 'true'

      - name: Run E2E smoke tests
        run: npm run test:e2e
        working-directory: frontend
        env:
          CI: 'true'
          VITE_REQUIRE_AUTH: 'true'
          PLAYWRIGHT_BASE_URL: 'http://127.0.0.1:4174'
