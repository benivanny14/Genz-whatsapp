services:
  # ── MongoDB Atlas (Recommended for production) ──
  # Comment out this service and use MONGODB_URI environment variable
  # with MongoDB Atlas connection string for production
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    profiles:
      - local

  # ── Redis (Optional - for distributed socket architecture) ──
  # Comment out this service and use REDIS_URL environment variable
  # with Redis Cloud connection string for production
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    profiles:
      - local

  # ── Backend Service ──
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      # Use MongoDB Atlas for production (set MONGODB_URI in .env)
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/tm-whatsapp}
      # Use Redis Cloud for production (set REDIS_URL in .env)
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      FRONTEND_URL: ${FRONTEND_URL:?Set FRONTEND_URL}
      PUBLIC_API_URL: ${PUBLIC_API_URL:?Set PUBLIC_API_URL}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET}
      ADMIN_BOOTSTRAP_TOKEN: ${ADMIN_BOOTSTRAP_TOKEN:?Set ADMIN_BOOTSTRAP_TOKEN}
      BACKUP_ENCRYPTION_KEY: ${BACKUP_ENCRYPTION_KEY:?Set BACKUP_ENCRYPTION_KEY}
      MESSAGE_ENCRYPTION_SECRET: ${MESSAGE_ENCRYPTION_SECRET:?Set MESSAGE_ENCRYPTION_SECRET}
      SMTP_HOST: ${SMTP_HOST:?Set SMTP_HOST}
      SMTP_USER: ${SMTP_USER:?Set SMTP_USER}
      SMTP_PASS: ${SMTP_PASS:?Set SMTP_PASS}
      JWT_EXPIRE: 7d
      ALLOW_ANONYMOUS_DEVICE_AUTH: "false"
      ALLOW_MOCK_PAYMENTS: "false"
      # Cloudinary is REQUIRED for production media storage
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:?Set CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:?Set CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:?Set CLOUDINARY_API_SECRET}
    depends_on:
      - mongo
      - redis
    profiles:
      - local

  # ── Frontend Service ──
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:?Set VITE_API_URL}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:?Set VITE_SOCKET_URL}
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    profiles:
      - local

volumes:
  mongo_data:
